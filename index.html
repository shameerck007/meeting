<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Minutes — Meeting Notes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f5f4f0;
  --surface:#ffffff;
  --surface2:#f9f8f5;
  --surface3:#f0efe9;
  --border:#e2e0d8;
  --border2:#ccc9be;
  --accent:#1a56db;
  --accent-light:#eff4ff;
  --accent-mid:#3b71eb;
  --text:#1a1916;
  --text2:#5a5750;
  --text3:#9b9890;
  --green:#1a7a4a;--green-bg:#f0faf4;--green-border:#b6e6ce;
  --red:#c5291a;--red-bg:#fef2f1;--red-border:#f5b8b2;
  --amber:#9a5f0a;--amber-bg:#fffbeb;--amber-border:#fcd888;
  --blue:#1a56db;--blue-bg:#eff4ff;--blue-border:#bed3fb;
  --radius:10px;--radius-lg:14px;--radius-xl:18px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --sidebar-w:268px;
}

html{height:100%;overflow:hidden}
body{font-family:'Geist',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;position:fixed;width:100%}

/* ── Sidebar ── */
#sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:200}
.sidebar-top{padding:1.25rem 1.1rem .85rem}
.brand-row{display:flex;align-items:center;gap:9px;margin-bottom:2px}
.brand-icon{width:30px;height:30px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Instrument Serif',serif;font-size:15px;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(26,86,219,.3)}
.brand-name{font-family:'Instrument Serif',serif;font-size:19px;color:var(--text);letter-spacing:-.03em}
.brand-tagline{font-size:10px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;font-weight:500;padding-left:39px}
#new-btn{margin:.65rem .9rem;padding:.65rem 1rem;background:var(--accent);color:#fff;border:none;border-radius:9px;font-family:'Geist',sans-serif;font-size:11.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .18s;box-shadow:0 2px 8px rgba(26,86,219,.3);min-height:44px}
#new-btn:hover{background:var(--accent-mid);box-shadow:0 4px 16px rgba(26,86,219,.38);transform:translateY(-1px)}
.sidebar-label{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);font-weight:600;padding:.4rem 1.1rem .3rem}
#meeting-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 .55rem .55rem}
#meeting-list::-webkit-scrollbar{width:3px}
#meeting-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.meeting-item{padding:.65rem .85rem;border-radius:10px;cursor:pointer;margin-bottom:3px;transition:all .14s;border:1px solid transparent;position:relative;min-height:56px}
.meeting-item:hover{background:var(--surface2);border-color:var(--border)}
.meeting-item.active{background:var(--accent-light);border-color:var(--blue-border)}
.meeting-item.active::before{content:'';position:absolute;left:0;top:22%;bottom:22%;width:3px;background:var(--accent);border-radius:0 3px 3px 0}
.m-title{font-size:12.5px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.meeting-item.active .m-title{color:var(--accent)}
.m-meta{font-size:10.5px;color:var(--text3);display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.m-badge{font-size:9px;font-weight:600;padding:2px 7px;border-radius:20px;background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.m-badge.open{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border)}
.sidebar-foot{padding:.85rem 1.1rem;border-top:1px solid var(--border);font-size:11px;color:var(--text3);font-family:'Instrument Serif',serif;font-style:italic;text-align:center}

/* ── Main ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);min-width:0}
#toolbar{padding:.6rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.4rem;background:var(--surface);flex-shrink:0;flex-wrap:wrap}
.toolbar-title{font-family:'Instrument Serif',serif;font-size:14px;color:var(--text2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:italic;min-width:60px}
.save-indicator{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3);font-family:'Geist Mono',monospace;white-space:nowrap}
.save-dot{width:6px;height:6px;border-radius:50%;background:var(--border2)}
.save-dot.unsaved{background:var(--amber);animation:pulse 1.5s ease-in-out infinite}
.save-dot.saved{background:var(--green)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.tb-sep{width:1px;height:22px;background:var(--border);flex-shrink:0;margin:0 2px}
.tb-btn{padding:.42rem .75rem;border:1px solid var(--border);background:var(--surface);border-radius:8px;cursor:pointer;font-family:'Geist',sans-serif;font-size:11px;font-weight:500;color:var(--text2);display:flex;align-items:center;gap:5px;transition:all .14s;white-space:nowrap;box-shadow:var(--shadow);min-height:36px}
.tb-btn:hover{background:var(--surface2);border-color:var(--border2);color:var(--text)}
.tb-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.btn-save{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.btn-save:hover{background:#e0f7ed;border-color:var(--green)}
.btn-pdf{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;box-shadow:0 2px 8px rgba(26,86,219,.25)}
.btn-pdf:hover{background:var(--accent-mid);border-color:var(--accent-mid);box-shadow:0 4px 14px rgba(26,86,219,.35);transform:translateY(-1px);color:#fff}
.btn-pdf svg{stroke:#fff}
.btn-del{color:var(--red);border-color:var(--red-border)}
.btn-del:hover{background:var(--red-bg);border-color:var(--red)}

/* Hamburger */
#ham-btn{display:none;align-items:center;justify-content:center;width:36px;height:36px;border:1px solid var(--border);border-radius:8px;background:var(--surface);cursor:pointer;flex-shrink:0;box-shadow:var(--shadow)}
#ham-btn svg{width:16px;height:16px;stroke:var(--text2);fill:none;stroke-width:2;stroke-linecap:round}
/* Overlay */
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:190;backdrop-filter:blur(2px)}

#editor-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1.5rem 1.25rem 5rem}
#editor-area::-webkit-scrollbar{width:5px}
#editor-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
#empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:1.1rem}
.empty-glyph{width:60px;height:60px;border-radius:16px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Instrument Serif',serif;font-size:24px;color:var(--text3);box-shadow:var(--shadow)}
.empty-h{font-family:'Instrument Serif',serif;font-size:20px;color:var(--text2)}
.empty-p{font-size:13px;color:var(--text3);text-align:center;max-width:250px;line-height:1.65}

.hdr-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:1.5rem 1.4rem 1.2rem;margin-bottom:1rem;box-shadow:var(--shadow)}
.company-input{font-family:'Geist',sans-serif;font-size:10.5px;font-weight:600;border:none;background:transparent;color:var(--accent);outline:none;width:100%;letter-spacing:.14em;text-transform:uppercase;margin-bottom:.4rem}
.company-input::placeholder{color:var(--blue-border)}
.mtg-title-input{font-family:'Instrument Serif',serif;font-size:26px;border:none;background:transparent;color:var(--text);outline:none;width:100%;padding:.15rem 0;border-bottom:2px solid transparent;transition:border-color .2s;margin-bottom:.7rem}
.mtg-title-input:focus{border-bottom-color:var(--accent)}
.mtg-title-input::placeholder{color:var(--text3)}
.meta-bar{display:flex;gap:.5rem;flex-wrap:wrap}
.meta-chip{display:flex;align-items:center;gap:5px;padding:.32rem .75rem;border-radius:20px;background:var(--surface2);border:1px solid var(--border);font-size:11.5px;color:var(--text2)}
.meta-chip svg{width:11px;height:11px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.meta-chip input{background:transparent;border:none;outline:none;color:var(--text);font-size:11.5px;font-family:'Geist',sans-serif;min-height:28px}
.meta-chip input::-webkit-calendar-picker-indicator{filter:opacity(.4);cursor:pointer}

.sec-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:1.2rem 1.2rem 1rem;margin-bottom:1rem;transition:border-color .18s;box-shadow:var(--shadow)}
.sec-card:focus-within{border-color:var(--border2);box-shadow:var(--shadow-md)}
.sec-head{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem}
.sec-ico{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sec-ico svg{width:13px;height:13px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ico-blue{background:var(--blue-bg)}.ico-blue svg{stroke:var(--blue)}
.ico-amber{background:var(--amber-bg)}.ico-amber svg{stroke:var(--amber)}
.ico-teal{background:#f0fdfa}.ico-teal svg{stroke:#0f766e}
.ico-green{background:var(--green-bg)}.ico-green svg{stroke:var(--green)}
.ico-indigo{background:#eef2ff}.ico-indigo svg{stroke:#4f46e5}
.sec-title{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text2)}
.sec-count{margin-left:auto;font-size:10px;color:var(--text3);font-family:'Geist Mono',monospace;background:var(--surface2);padding:.18rem .55rem;border-radius:20px;border:1px solid var(--border)}

.attendees-wrap{display:flex;flex-wrap:wrap;gap:.4rem;align-items:center;min-height:32px}
.att-tag{display:flex;align-items:center;gap:5px;padding:.28rem .7rem;border-radius:20px;background:var(--blue-bg);border:1px solid var(--blue-border);font-size:11.5px;color:var(--blue);font-weight:500}
.att-tag button{background:none;border:none;color:var(--blue-border);cursor:pointer;font-size:15px;line-height:1;padding:0;transition:color .14s;min-width:20px;min-height:20px;display:flex;align-items:center;justify-content:center}
.att-tag button:hover{color:var(--red)}
.att-input{border:1px dashed var(--border2);border-radius:20px;padding:.28rem .8rem;font-size:11.5px;font-family:'Geist',sans-serif;outline:none;background:transparent;color:var(--text);min-width:130px;transition:all .18s;margin-top:.35rem;min-height:36px}
.att-input:focus{border-color:var(--accent);border-style:solid;background:var(--accent-light)}

.agenda-row{display:flex;gap:.6rem;align-items:center;padding:.55rem .7rem;border-radius:9px;margin-bottom:.35rem;background:var(--surface2);border:1px solid transparent;transition:all .14s}
.agenda-row:hover{border-color:var(--border)}
.ag-num{width:22px;height:22px;border-radius:6px;background:var(--amber-bg);border:1px solid var(--amber-border);display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:700;color:var(--amber);font-family:'Geist Mono',monospace;flex-shrink:0}
.agenda-row input[type=text]{flex:1;border:none;background:transparent;color:var(--text);font-size:12.5px;font-family:'Geist',sans-serif;outline:none;min-height:36px}
.agenda-row input[type=text]::placeholder{color:var(--text3)}
.ag-mins{display:flex;align-items:center;gap:3px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.22rem .45rem;font-size:10.5px;color:var(--text3)}
.ag-mins input{width:34px;border:none;background:transparent;color:var(--text2);font-family:'Geist Mono',monospace;font-size:11px;text-align:center;outline:none;min-height:28px}
.ag-rm{background:none;border:none;color:var(--text3);cursor:pointer;width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all .14s;flex-shrink:0}
.ag-rm:hover{background:var(--red-bg);color:var(--red)}
.ag-rm svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round}
.add-btn{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:500;color:var(--text3);background:none;border:1px dashed var(--border);border-radius:8px;cursor:pointer;padding:.42rem .85rem;transition:all .14s;margin-top:.3rem;min-height:36px}
.add-btn:hover{background:var(--surface2);color:var(--accent);border-color:var(--accent)}
.add-btn svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

.kd-row{display:flex;gap:.6rem;align-items:flex-start;padding:.55rem .7rem;border-radius:9px;margin-bottom:.35rem;background:var(--surface2);border:1px solid transparent;transition:border-color .14s}
.kd-row:hover{border-color:var(--border)}
.kd-bullet{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:7px}
.kd-row textarea{flex:1;border:none;background:transparent;color:var(--text);font-size:12.5px;font-family:'Geist',sans-serif;outline:none;resize:none;line-height:1.6;min-height:24px;overflow:hidden}
.kd-row textarea::placeholder{color:var(--text3)}
.kd-rm{background:none;border:none;color:var(--text3);cursor:pointer;width:28px;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center;transition:all .14s;flex-shrink:0;margin-top:4px}
.kd-rm:hover{background:var(--red-bg);color:var(--red)}
.kd-rm svg{width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round}

.notes-ta{width:100%;min-height:100px;border:none;background:transparent;color:var(--text);font-family:'Geist',sans-serif;font-size:13px;line-height:1.75;resize:vertical;outline:none}
.notes-ta::placeholder{color:var(--text3)}

/* ── Action Items Table (scrollable on mobile) ── */
.action-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface)}
.action-table{width:100%;border-collapse:collapse;font-size:12px;min-width:560px}
.action-table th{text-align:left;font-size:9.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:.6rem .85rem;background:var(--surface2);border-bottom:1px solid var(--border)}
.action-table td{padding:.6rem .85rem;border-bottom:1px solid var(--border);vertical-align:middle}
.action-table tr:last-child td{border-bottom:none}
.action-table tbody tr:hover td{background:var(--surface2)}
.at-cb{width:15px;height:15px;accent-color:var(--accent);cursor:pointer}
.at-task{color:var(--text);font-size:12.5px;line-height:1.5}
.at-task.done{text-decoration:line-through;color:var(--text3)}
.at-owner{font-size:11.5px;color:var(--blue);font-family:'Geist Mono',monospace}
.priority-badge{display:inline-flex;align-items:center;justify-content:center;padding:.22rem .65rem;border-radius:20px;font-size:9.5px;font-weight:600}
.p-high{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.p-med{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.p-low{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.status-badge{display:inline-flex;align-items:center;justify-content:center;padding:.22rem .65rem;border-radius:20px;font-size:9.5px;font-weight:600}
.s-open{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.s-done{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.s-prog{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.at-rm{background:none;border:none;color:var(--text3);cursor:pointer;padding:.15rem;border-radius:4px;display:flex;transition:all .14s;min-width:24px;min-height:24px;align-items:center;justify-content:center}
.at-rm:hover{background:var(--red-bg);color:var(--red)}
.at-rm svg{width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round}

/* ── Add action row ── */
.add-action-row{display:flex;gap:.5rem;margin-top:.75rem;align-items:center;flex-wrap:wrap}
.add-action-row input,.add-action-row select{border:1px solid var(--border);border-radius:8px;padding:.44rem .75rem;font-family:'Geist',sans-serif;font-size:11.5px;background:var(--surface);color:var(--text);outline:none;transition:border-color .18s;box-shadow:var(--shadow);min-height:40px;appearance:auto}
.add-action-row input:focus,.add-action-row select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,86,219,.1)}
.add-action-row input::placeholder{color:var(--text3)}
.btn-add-action{padding:.44rem .9rem;background:var(--accent);border:1px solid var(--accent);border-radius:8px;color:#fff;font-size:11.5px;font-weight:600;cursor:pointer;font-family:'Geist',sans-serif;transition:all .14s;white-space:nowrap;box-shadow:0 1px 4px rgba(26,86,219,.25);min-height:40px}
.btn-add-action:hover{background:var(--accent-mid);box-shadow:0 3px 10px rgba(26,86,219,.3)}

/* Owner combo: input + datalist */
.owner-wrap{position:relative;display:flex;align-items:center}
#ai-owner{width:120px}
/* Timeline date */
#ai-timeline{width:135px;cursor:pointer}
#ai-timeline::-webkit-calendar-picker-indicator{cursor:pointer;opacity:.6}

#toast{position:fixed;bottom:1.5rem;right:1.5rem;padding:.65rem 1.15rem;border-radius:10px;font-size:12px;font-weight:500;opacity:0;pointer-events:none;transition:all .25s;display:flex;align-items:center;gap:.5rem;z-index:9999;transform:translateY(8px);box-shadow:var(--shadow-md)}
#toast.show{opacity:1;transform:translateY(0)}
#toast.success{background:#1a7a4a;color:#fff}
#toast.info{background:var(--accent);color:#fff}
#toast svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

/* ── Mobile Responsive ── */
@media(max-width:768px){
  html,body{position:fixed;overflow:hidden}
  #ham-btn{display:flex}
  #sidebar{
    position:fixed;top:0;left:0;height:100%;
    transform:translateX(-100%);
    box-shadow:var(--shadow-md);
  }
  #sidebar.open{transform:translateX(0)}
  #sidebar-overlay.open{display:block}
  #main{width:100%}
  #toolbar{padding:.5rem .75rem;gap:.3rem}
  .toolbar-title{font-size:13px}
  .tb-sep{display:none}
  /* hide text labels on small, show icons only for some buttons */
  .tb-lbl{display:none}
  .tb-btn{padding:.42rem .6rem;min-height:38px}
  #editor-area{padding:1rem .85rem 6rem}
  .hdr-block{padding:1.1rem 1rem .9rem;border-radius:14px}
  .mtg-title-input{font-size:21px}
  .sec-card{padding:1rem .9rem .85rem;border-radius:14px}
  .add-action-row{gap:.4rem}
  .add-action-row input,.add-action-row select{font-size:13px;min-height:44px}
  .btn-add-action{min-height:44px;width:100%}
  #ai-task{width:100%!important;flex:unset}
  #ai-owner{width:100%!important}
  #ai-timeline{width:100%!important}
  #ai-priority,#ai-status{flex:1}
  .action-table{min-width:500px;font-size:11.5px}
  #toast{left:1rem;right:1rem;bottom:1.2rem;font-size:13px}
  .meta-bar{gap:.4rem}
  .meta-chip input{font-size:12px}
}

@media(max-width:480px){
  .brand-name{font-size:17px}
  .mtg-title-input{font-size:19px}
  #editor-area{padding:.85rem .65rem 6rem}
  .hdr-block,.sec-card{border-radius:12px}
}
</style>
</head>
<body>

<!-- Mobile sidebar overlay -->
<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<div id="sidebar">
  <div class="sidebar-top">
    <div class="brand-row">
      <div class="brand-icon">M</div>
      <span class="brand-name">Minutes</span>
    </div>
    <div class="brand-tagline">Meeting Notes</div>
  </div>
  <button id="new-btn" onclick="newMeeting()">
    <svg viewBox="0 0 24 24" style="width:12px;height:12px;fill:none;stroke:#fff;stroke-width:3;stroke-linecap:round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    New Meeting
  </button>
  <div class="sidebar-label">Recent Meetings</div>
  <div id="meeting-list"></div>
  <div class="sidebar-foot">Record · Reflect · Act</div>
</div>

<div id="main">
  <div id="toolbar">
    <!-- Hamburger (mobile only) -->
    <button id="ham-btn" onclick="toggleSidebar()" aria-label="Toggle menu">
      <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <span class="toolbar-title" id="toolbar-title">Select a meeting</span>
    <div class="save-indicator"><div class="save-dot" id="save-dot"></div><span id="save-lbl">—</span></div>
    <button class="tb-btn btn-save" onclick="saveMeeting()">
      <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg><span class="tb-lbl">Save</span>
    </button>
    <button class="tb-btn" onclick="duplicateMeeting()">
      <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><span class="tb-lbl">Duplicate</span>
    </button>
    <button class="tb-btn btn-del" onclick="deleteMeeting()">
      <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg><span class="tb-lbl">Delete</span>
    </button>
    <button class="tb-btn btn-pdf" onclick="exportPDF()">
      <svg viewBox="0 0 24 24" style="stroke:#fff"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 18 15 15"/></svg><span class="tb-lbl">Export PDF</span>
    </button>
  </div>
  <div id="editor-area">
    <div id="empty-state">
      <div class="empty-glyph">✦</div>
      <div class="empty-h">No meeting selected</div>
      <div class="empty-p">Create a new meeting or choose one from the sidebar to begin.</div>
    </div>
  </div>
</div>

<div id="toast"><svg id="t-icon" viewBox="0 0 24 24"></svg><span id="t-msg"></span></div>

<script>
let meetings=JSON.parse(localStorage.getItem('minutes_v5')||'[]');
let currentId=null,unsaved=false;
const save=()=>localStorage.setItem('minutes_v5',JSON.stringify(meetings));
const getMtg=()=>meetings.find(m=>m.id===currentId);
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

/* ── Sidebar toggle (mobile) ── */
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  document.getElementById('t-msg').textContent=msg;
  document.getElementById('t-icon').innerHTML=type==='success'?'<polyline points="20 6 9 17 4 12"/>':'<circle cx="12" cy="12" r="10"/>';
  t.className='show '+type;
  clearTimeout(t._t);t._t=setTimeout(()=>t.className='',2600);
}
function markUnsaved(){unsaved=true;const d=document.getElementById('save-dot'),l=document.getElementById('save-lbl');if(d)d.className='save-dot unsaved';if(l)l.textContent='Unsaved';}
function markSaved(){unsaved=false;const d=document.getElementById('save-dot'),l=document.getElementById('save-lbl');if(d)d.className='save-dot saved';if(l)l.textContent='Saved';}

function renderList(){
  const el=document.getElementById('meeting-list');
  if(!meetings.length){el.innerHTML='<div style="padding:.6rem .85rem;font-size:11px;color:var(--text3);font-style:italic">No meetings yet</div>';return;}
  el.innerHTML=meetings.slice().reverse().map(m=>{
    const open=(m.actionItems||[]).filter(a=>a.status!=='Done').length;
    return `<div class="meeting-item${m.id===currentId?' active':''}" onclick="selectMeeting('${m.id}')">
      <div class="m-title">${esc(m.title)||'Untitled'}</div>
      <div class="m-meta">${m.company?'<span>'+esc(m.company)+'</span> · ':''}<span>${m.date||'No date'}</span><span class="m-badge${open>0?' open':''}">${open>0?open+' open':'✓ Done'}</span></div>
    </div>`;
  }).join('');
}

function newMeeting(){
  const id='mtg_'+Date.now();
  meetings.push({id,company:'',title:'New Meeting',date:new Date().toISOString().slice(0,10),time:'09:00',location:'',attendees:[],agenda:[{topic:'Opening',mins:10}],keyPoints:[],notes:'',actionItems:[]});
  save();currentId=id;renderList();renderEditor();closeSidebar();
}
function selectMeeting(id){
  if(unsaved&&currentId&&!confirm('Unsaved changes — leave without saving?'))return;
  currentId=id;unsaved=false;renderList();renderEditor();closeSidebar();
}
function saveMeeting(){if(!currentId)return;save();markSaved();showToast('Meeting saved');renderList();}
function deleteMeeting(){
  const m=getMtg();if(!m)return;
  if(!confirm('Delete "'+( m.title||'this meeting')+'"?'))return;
  meetings=meetings.filter(x=>x.id!==currentId);
  currentId=meetings.length?meetings[meetings.length-1].id:null;
  save();unsaved=false;renderList();renderEditor();showToast('Deleted','info');
}
function duplicateMeeting(){
  const m=getMtg();if(!m)return;
  const c={...JSON.parse(JSON.stringify(m)),id:'mtg_'+Date.now(),title:m.title+' (Copy)'};
  meetings.push(c);save();currentId=c.id;renderList();renderEditor();showToast('Duplicated');
}

/* ── Owner datalist from participants ── */
function buildOwnerDatalist(attendees){
  return `<datalist id="owners-list">${(attendees||[]).map(a=>`<option value="${esc(a)}">`).join('')}</datalist>`;
}

/* ── Format date for display ── */
function fmtDate(d){
  if(!d)return'—';
  try{const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch{return d;}
}

function renderEditor(){
  const el=document.getElementById('editor-area');
  const ttl=document.getElementById('toolbar-title');
  const m=getMtg();
  if(!m){
    el.innerHTML='<div id="empty-state"><div class="empty-glyph">✦</div><div class="empty-h">No meeting selected</div><div class="empty-p">Create a new meeting or choose one from the sidebar to begin.</div></div>';
    if(ttl)ttl.textContent='Select a meeting';
    document.getElementById('save-dot').className='save-dot';
    document.getElementById('save-lbl').textContent='—';
    return;
  }
  if(ttl)ttl.textContent=(m.company?m.company+' — ':'')+( m.title||'Untitled');
  markSaved();
  el.innerHTML=`
    <div class="hdr-block">
      <input class="company-input" value="${esc(m.company)}" placeholder="Company Name" oninput="updateField('company',this.value)">
      <input class="mtg-title-input" value="${esc(m.title)}" placeholder="Meeting Title" oninput="updateField('title',this.value)">
      <div class="meta-bar">
        <div class="meta-chip"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><input type="date" value="${m.date}" oninput="updateField('date',this.value)"></div>
        <div class="meta-chip"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><input type="time" value="${m.time||'09:00'}" oninput="updateField('time',this.value)"></div>
        <div class="meta-chip" style="flex:1;min-width:150px"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><input type="text" value="${esc(m.location)}" placeholder="Location or meeting link" oninput="updateField('location',this.value)" style="width:100%"></div>
      </div>
    </div>

    <div class="sec-card">
      <div class="sec-head">
        <div class="sec-ico ico-blue"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
        <div class="sec-title">Participants</div>
        <span class="sec-count" id="cnt-att">${(m.attendees||[]).length} people</span>
      </div>
      <div class="attendees-wrap" id="att-tags">${renderAttendees(m)}</div>
      <input class="att-input" placeholder="Type a name and press Enter…" onkeydown="addAttendee(event)" id="att-inp">
    </div>

    <div class="sec-card">
      <div class="sec-head">
        <div class="sec-ico ico-amber"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></div>
        <div class="sec-title">Meeting Agenda</div>
        <span class="sec-count" id="cnt-ag">${(m.agenda||[]).reduce((s,a)=>s+(+a.mins||0),0)} min</span>
      </div>
      <div id="agenda-list">${renderAgenda(m)}</div>
      <button class="add-btn" onclick="addAgendaItem()"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add agenda item</button>
    </div>

    <div class="sec-card">
      <div class="sec-head">
        <div class="sec-ico ico-teal"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
        <div class="sec-title">Key Discussion Points</div>
      </div>
      <div id="kd-list">${renderKeyPoints(m)}</div>
      <button class="add-btn" onclick="addKeyPoint()"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add discussion point</button>
    </div>

    <div class="sec-card">
      <div class="sec-head">
        <div class="sec-ico ico-indigo"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div>
        <div class="sec-title">Additional Notes</div>
      </div>
      <textarea class="notes-ta" placeholder="Decisions made, context, follow-ups…" oninput="updateField('notes',this.value)">${esc(m.notes)}</textarea>
    </div>

    <div class="sec-card">
      <div class="sec-head">
        <div class="sec-ico ico-green"><svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></div>
        <div class="sec-title">Action Items</div>
        <span class="sec-count" id="cnt-ai">${(m.actionItems||[]).filter(a=>a.status!=='Done').length} open · ${(m.actionItems||[]).length} total</span>
      </div>
      <div class="action-table-wrap">
        <table class="action-table">
          <thead><tr><th style="width:32px"></th><th>Action Item</th><th>Owner</th><th>Priority</th><th>Due Date</th><th>Status</th><th style="width:32px"></th></tr></thead>
          <tbody id="actions-tbody">${renderActions(m)}</tbody>
        </table>
      </div>
      ${buildOwnerDatalist(m.attendees)}
      <div class="add-action-row">
        <input type="text" id="ai-task" placeholder="Action item description…" style="flex:2;min-width:140px">
        <input type="text" id="ai-owner" list="owners-list" placeholder="Owner" autocomplete="off">
        <select id="ai-priority"><option value="High">High</option><option value="Medium" selected>Medium</option><option value="Low">Low</option></select>
        <input type="date" id="ai-timeline" title="Pick a due date">
        <select id="ai-status"><option value="Open" selected>Open</option><option value="In Progress">In Progress</option><option value="Done">Done</option></select>
        <button class="btn-add-action" onclick="addAction()">+ Add Item</button>
      </div>
      <p style="font-size:10.5px;color:var(--text3);margin-top:.5rem">💡 Owner: choose a participant or type any name &nbsp;·&nbsp; Due Date: tap/click to pick a date</p>
    </div>
    <div style="height:2rem"></div>`;
}

function renderAttendees(m){return(m.attendees||[]).map((a,i)=>`<span class="att-tag">${esc(a)}<button onclick="removeAttendee(${i})">×</button></span>`).join('');}

function addAttendee(e){
  if(e.key!=='Enter')return;const v=e.target.value.trim();if(!v)return;
  const m=getMtg();m.attendees.push(v);markUnsaved();
  document.getElementById('att-tags').innerHTML=renderAttendees(m);e.target.value='';updateCounters();
  // Refresh datalist
  const dl=document.getElementById('owners-list');if(dl)dl.innerHTML=m.attendees.map(a=>`<option value="${esc(a)}">`).join('');
}
function removeAttendee(i){
  const m=getMtg();m.attendees.splice(i,1);markUnsaved();
  document.getElementById('att-tags').innerHTML=renderAttendees(m);updateCounters();
  const dl=document.getElementById('owners-list');if(dl)dl.innerHTML=m.attendees.map(a=>`<option value="${esc(a)}">`).join('');
}

function renderAgenda(m){
  return(m.agenda||[]).map((a,i)=>`<div class="agenda-row"><div class="ag-num">${i+1}</div><input type="text" value="${esc(a.topic)}" placeholder="Agenda topic…" oninput="updateAgenda(${i},'topic',this.value)"><div class="ag-mins"><input type="number" value="${a.mins||15}" min="1" oninput="updateAgenda(${i},'mins',+this.value)"><span>min</span></div><button class="ag-rm" onclick="removeAgendaItem(${i})"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>`).join('');
}
function addAgendaItem(){const m=getMtg();m.agenda.push({topic:'',mins:15});markUnsaved();document.getElementById('agenda-list').innerHTML=renderAgenda(m);updateCounters();}
function removeAgendaItem(i){const m=getMtg();m.agenda.splice(i,1);markUnsaved();document.getElementById('agenda-list').innerHTML=renderAgenda(m);updateCounters();}
function updateAgenda(i,key,val){const m=getMtg();m.agenda[i][key]=val;markUnsaved();updateCounters();}

function renderKeyPoints(m){
  if(!(m.keyPoints||[]).length)return'<div style="font-size:12.5px;color:var(--text3);padding:.35rem .2rem;font-style:italic">No discussion points yet.</div>';
  return m.keyPoints.map((p,i)=>`<div class="kd-row"><div class="kd-bullet"></div><textarea rows="1" placeholder="Discussion point…" oninput="updateKeyPoint(${i},this.value);autoResize(this)">${esc(p)}</textarea><button class="kd-rm" onclick="removeKeyPoint(${i})"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>`).join('');
}
function addKeyPoint(){const m=getMtg();if(!m.keyPoints)m.keyPoints=[];m.keyPoints.push('');markUnsaved();document.getElementById('kd-list').innerHTML=renderKeyPoints(m);}
function removeKeyPoint(i){const m=getMtg();m.keyPoints.splice(i,1);markUnsaved();document.getElementById('kd-list').innerHTML=renderKeyPoints(m);}
function updateKeyPoint(i,val){const m=getMtg();m.keyPoints[i]=val;markUnsaved();}
function autoResize(ta){ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';}

function priorityClass(p){return p==='High'?'p-high':p==='Medium'?'p-med':'p-low';}
function statusClass(s){return s==='Done'?'s-done':s==='In Progress'?'s-prog':'s-open';}

function renderActions(m){
  if(!(m.actionItems||[]).length)return`<tr><td colspan="7" style="font-size:12px;color:var(--text3);font-style:italic;padding:.75rem .85rem">No action items yet — add one below.</td></tr>`;
  return m.actionItems.map((a,i)=>`<tr>
    <td><input type="checkbox" class="at-cb" ${a.status==='Done'?'checked':''} onchange="toggleActionDone(${i})"></td>
    <td><span class="at-task${a.status==='Done'?' done':''}">${esc(a.task)}</span></td>
    <td><span class="at-owner">${esc(a.owner)||'—'}</span></td>
    <td><span class="priority-badge ${priorityClass(a.priority)}">${esc(a.priority||'Medium')}</span></td>
    <td style="font-size:12px;color:var(--text2);white-space:nowrap">${fmtDate(a.timeline)}</td>
    <td><span class="status-badge ${statusClass(a.status)}">${esc(a.status||'Open')}</span></td>
    <td><button class="at-rm" onclick="removeAction(${i})"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></td>
  </tr>`).join('');
}

function addAction(){
  const task=document.getElementById('ai-task').value.trim();if(!task)return;
  const owner=document.getElementById('ai-owner').value.trim();
  const priority=document.getElementById('ai-priority').value;
  const timeline=document.getElementById('ai-timeline').value; // ISO date string YYYY-MM-DD
  const status=document.getElementById('ai-status').value;
  const m=getMtg();m.actionItems.push({task,owner,priority,timeline,status});markUnsaved();
  document.getElementById('actions-tbody').innerHTML=renderActions(m);
  document.getElementById('ai-task').value='';
  document.getElementById('ai-owner').value='';
  document.getElementById('ai-timeline').value='';
  document.getElementById('ai-priority').value='Medium';
  document.getElementById('ai-status').value='Open';
  updateCounters();
}
function toggleActionDone(i){const m=getMtg();m.actionItems[i].status=m.actionItems[i].status==='Done'?'Open':'Done';markUnsaved();document.getElementById('actions-tbody').innerHTML=renderActions(m);updateCounters();}
function removeAction(i){const m=getMtg();m.actionItems.splice(i,1);markUnsaved();document.getElementById('actions-tbody').innerHTML=renderActions(m);updateCounters();}

function updateField(key,val){
  const m=getMtg();if(!m)return;m[key]=val;markUnsaved();
  if(key==='title'||key==='company'){const t=document.getElementById('toolbar-title');if(t)t.textContent=(m.company?m.company+' — ':'')+( m.title||'Untitled');renderList();}
}
function updateCounters(){
  const m=getMtg();if(!m)return;
  const a=document.getElementById('cnt-att');if(a)a.textContent=(m.attendees||[]).length+' people';
  const b=document.getElementById('cnt-ag');if(b)b.textContent=(m.agenda||[]).reduce((s,x)=>s+(+x.mins||0),0)+' min';
  const c=document.getElementById('cnt-ai');if(c)c.textContent=(m.actionItems||[]).filter(a=>a.status!=='Done').length+' open · '+(m.actionItems||[]).length+' total';
}

function exportPDF(){
  const m=getMtg();if(!m){showToast('No meeting selected','info');return;}
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4',compress:true});

  // ══════════════════════════════════════════════
  // PALETTE  — Professional teal-slate theme
  // ══════════════════════════════════════════════
  const W=210,H=297,ML=22,MR=18,CW=W-ML-MR;

  // Primary (deep teal-blue)
  const PRI    =[22,88,110];    // deep teal
  const PRI_MD =[44,130,158];   // medium teal
  const PRI_LT =[229,245,250];  // pale teal tint
  const PRI_XL =[245,251,253];  // barely-there tint

  // Accent warm (for section bars)
  const ACC    =[38,70,120];    // deep navy for section titles
  const ACC_LT =[235,241,252];

  // Neutrals
  const WH     =[255,255,255];
  const BG_ROW =[247,250,252];
  const RULE   =[210,222,228];
  const BRD    =[182,202,210];
  const TXT    =[22,34,50];     // near-black
  const TXT2   =[72,90,108];    // slate
  const TXT3   =[138,158,172];  // light slate

  // Status palette
  const G_TXT=[20,110,65]; const G_BG=[232,251,242]; const G_BR=[170,225,196];
  const A_TXT=[148,90,12];  const A_BG=[254,248,228]; const A_BR=[230,192,110];
  const B_TXT=[25,80,175];  const B_BG=[232,241,255]; const B_BR=[168,196,240];
  const R_TXT=[178,35,28];  const R_BG=[254,238,236]; const R_BR=[235,170,165];

  // ── Drawing helpers ──
  const fc=(...c)=>doc.setFillColor(...(c.length===1?c[0]:c));
  const tc=(...c)=>doc.setTextColor(...(c.length===1?c[0]:c));
  const dc=(...c)=>doc.setDrawColor(...(c.length===1?c[0]:c));
  const lw=w=>doc.setLineWidth(w);
  const bf=(sty,sz)=>{doc.setFont('helvetica',sty);doc.setFontSize(sz);}
  const hline=(yy,x1,x2,w,col)=>{dc(...(col||RULE));lw(w||0.25);doc.line(x1,yy,x2,yy);}
  const rect=(x,y,w,h,col)=>{fc(...col);doc.rect(x,y,w,h,'F');}
  const wrap=(txt,maxW)=>doc.splitTextToSize(txt||'',maxW);

  let pageNum=0;

  // ── Running header (content pages) ──
  function drawHeader(){
    // Colored strip
    rect(0,0,W,12,PRI);
    // Thin accent stripe at very top
    rect(0,0,W,2.5,PRI_MD);
    tc(...WH);bf('bold',7.5);
    const hLabel=((m.company?m.company+'  ·  ':'')+( m.title||'Meeting Minutes')).slice(0,70);
    doc.text(hLabel,ML,8);
    bf('normal',7);
    doc.text('MEETING MINUTES',W-MR,8,{align:'right'});
  }

  // ── Page footer ──
  function drawFooter(pg){
    const tot=doc.internal.getNumberOfPages();
    rect(0,H-13,W,13,PRI_XL);
    hline(H-13,0,W,0.3,BRD);
    tc(...TXT3);bf('normal',7);
    doc.text(m.company||'',ML,H-7.5);
    tc(...TXT2);bf('normal',7);
    doc.text('CONFIDENTIAL  —  For Internal Use Only',W/2,H-7.5,{align:'center'});
    tc(...TXT3);bf('normal',7);
    doc.text('Page '+pg+' of '+tot,W-MR,H-7.5,{align:'right'});
    tc(...TXT3);bf('normal',6.5);
    doc.text(m.date?'Meeting: '+fmtDate(m.date):'',ML,H-3.5);
    doc.text('Generated '+new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),W-MR,H-3.5,{align:'right'});
  }

  function newPage(){
    doc.addPage();pageNum++;
    rect(0,0,W,H,WH);
    drawHeader();
    drawFooter(pageNum);
    return 18;
  }

  function chk(need,yy){
    if(yy+need>H-18){yy=newPage();}
    return yy;
  }

  // ── Section heading: left colored bar + styled title ──
  function secHead(num,title,yy){
    yy=chk(18,yy)+4;
    // Colored left bar
    rect(ML,yy-1,3.5,9,PRI);
    // Light tint background
    rect(ML+3.5,yy-1,CW-3.5,9,PRI_LT);
    // Section number (teal)
    tc(...PRI_MD);bf('bold',7.5);doc.setCharSpace(0.5);
    doc.text(num,ML+6,yy+5.5);
    // Section title
    tc(...ACC);bf('bold',9);doc.setCharSpace(1.4);
    doc.text(title.toUpperCase(),ML+16,yy+5.5);
    doc.setCharSpace(0);
    return yy+14;
  }

  // ── Pill/badge helper ──
  function badge(txt,x,y,txC,bgC,brC){
    const tw=doc.getStringUnitWidth(txt)*7/doc.internal.scaleFactor;
    const bw=tw+8,bh=6.5,bx=x,by=y-4.5;
    fc(...bgC);doc.rect(bx,by,bw,bh,'F');
    dc(...brC);lw(0.25);doc.rect(bx,by,bw,bh,'S');
    tc(...txC);bf('bold',6.5);
    doc.text(txt,bx+bw/2,by+4.3,{align:'center'});
  }

  // ════════════════════════════════════════════
  //  PAGE 1 — COVER
  // ════════════════════════════════════════════
  pageNum=1;
  rect(0,0,W,H,WH);

  // ── Header banner ──
  rect(0,0,W,48,PRI);
  rect(0,0,W,4,PRI_MD);          // thick accent stripe on top
  hline(48,0,W,0.5,PRI_MD);

  // Company name
  let cy=16;
  if(m.company){
    tc(...WH);bf('bold',14);doc.setCharSpace(2);
    doc.text(m.company.toUpperCase(),ML,cy);
    doc.setCharSpace(0);
    tc(180,220,232);bf('normal',8);doc.setCharSpace(1.5);
    doc.text('MEETING MINUTES',W-MR,cy,{align:'right'});
    doc.setCharSpace(0);
  } else {
    tc(...WH);bf('bold',14);doc.setCharSpace(2);
    doc.text('MEETING MINUTES',ML,cy);
    doc.setCharSpace(0);
  }

  // Date in banner (right side, below)
  if(m.date){
    tc(180,220,232);bf('normal',8);
    doc.text(fmtDate(m.date),W-MR,cy+9,{align:'right'});
  }

  // ── Meeting title (below banner) ──
  let y=60;
  tc(...TXT);bf('bold',24);
  const tLines=wrap(m.title||'Meeting Minutes',CW);
  tLines.slice(0,3).forEach(l=>{doc.text(l,ML,y);y+=12;});

  // Colored rule under title
  y+=2;
  rect(ML,y,CW,1.2,PRI);
  rect(ML,y+1.2,CW*0.35,0.8,PRI_MD);
  y+=8;

  // ── Meeting details row ──
  const DET=[
    {ico:'📅',lbl:'DATE',val:m.date?fmtDate(m.date):'—'},
    {ico:'🕐',lbl:'TIME',val:m.time||'—'},
    {ico:'📍',lbl:'LOCATION',val:m.location||'—'},
  ];
  const dw=CW/3;
  DET.forEach((d,i)=>{
    const dx=ML+i*dw;
    // Light card bg
    rect(dx+(i>0?2:0),y,dw-(i>0?4:2),24,PRI_XL);
    if(i>0){dc(...BRD);lw(0.3);doc.line(dx+2,y+3,dx+2,y+21);}
    tc(...PRI_MD);bf('bold',6.5);doc.setCharSpace(1);
    doc.text(d.lbl,dx+(i>0?6:4),y+8);
    doc.setCharSpace(0);
    tc(...TXT);bf('bold',9.5);
    const vLines=wrap(d.val,dw-8);
    doc.text(vLines[0]||'—',dx+(i>0?6:4),y+17);
  });
  y+=30;

  // ── Reference info ──
  const ref='MOM-'+new Date().toISOString().slice(0,10).replace(/-/g,'');
  tc(...TXT3);bf('normal',7.5);
  doc.text('Document Ref: '+ref,ML,y);
  doc.text('Prepared: '+new Date().toLocaleDateString('en-US',{day:'2-digit',month:'long',year:'numeric'}),W-MR,y,{align:'right'});
  y+=10;

  // ── Attendees ──
  if((m.attendees||[]).length){
    hline(y,ML,W-MR,0.3,BRD);y+=6;
    // Label bar
    rect(ML,y,CW,8,PRI_LT);
    rect(ML,y,3,8,PRI);
    tc(...ACC);bf('bold',7.5);doc.setCharSpace(1.2);
    doc.text('IN ATTENDANCE',ML+7,y+5.5);doc.setCharSpace(0);
    tc(...TXT3);bf('normal',7);
    doc.text(m.attendees.length+' participant'+(m.attendees.length!==1?'s':''),W-MR,y+5.5,{align:'right'});
    y+=13;

    const aCols=m.attendees.length>6?3:2;
    const aColW=CW/aCols;
    m.attendees.forEach((a,i)=>{
      const col=i%aCols,row=Math.floor(i/aCols);
      const ax=ML+col*aColW,ay=y+row*7.5;
      if(ay>H-40)return;
      // Initial circle
      rect(ax,ay-4.5,6,6,PRI_LT);
      tc(...PRI);bf('bold',6.5);
      doc.text((a[0]||'?').toUpperCase(),ax+3,ay-0.2,{align:'center'});
      tc(...TXT);bf('normal',9);
      doc.text(a.slice(0,28),ax+9,ay);
    });
    y+=Math.ceil(m.attendees.length/aCols)*7.5+8;
  }

  // Cover page footer
  rect(0,H-13,W,13,PRI_XL);
  hline(H-13,0,W,0.3,BRD);
  tc(...TXT3);bf('normal',7);
  doc.text(m.company||'',ML,H-7.5);
  tc(...TXT2);bf('normal',7);
  doc.text('CONFIDENTIAL  —  For Internal Use Only',W/2,H-7.5,{align:'center'});
  tc(...TXT3);doc.text('Page 1',W-MR,H-7.5,{align:'right'});
  tc(...TXT3);bf('normal',6.5);
  if(m.date)doc.text('Meeting: '+fmtDate(m.date),ML,H-3.5);
  doc.text('Generated '+new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),W-MR,H-3.5,{align:'right'});

  // ════════════════════════════════════════════
  //  CONTENT PAGES
  // ════════════════════════════════════════════
  y=newPage();

  // ─── SECTION 1: AGENDA ───
  if((m.agenda||[]).length){
    y=secHead('01','Meeting Agenda',y);

    // Table header row
    rect(ML,y,CW,8,PRI);
    tc(...WH);bf('bold',7);doc.setCharSpace(0.7);
    doc.text('#',ML+4,y+5.5,{align:'center'});
    doc.text('AGENDA ITEM',ML+12,y+5.5);
    doc.text('DURATION',W-MR,y+5.5,{align:'right'});
    doc.setCharSpace(0);
    y+=9;

    let totMins=0;
    m.agenda.forEach((a,i)=>{
      const rh=9;
      y=chk(rh+1,y);
      // Alt row
      rect(ML,y,CW,rh,i%2===0?WH:BG_ROW);
      // Left accent micro-bar
      rect(ML,y,1.5,rh,i%2===0?PRI_LT:BRD);
      hline(y+rh,ML,W-MR,0.2,RULE);
      // Number
      tc(...TXT3);bf('bold',8);
      doc.text(String(i+1).padStart(2,'0'),ML+5.5,y+6,{align:'center'});
      // Topic
      tc(...TXT);bf('normal',9.5);
      const tl=wrap(a.topic||'—',CW-40);
      doc.text(tl[0],ML+12,y+6);
      // Duration pill
      if(a.mins){
        totMins+=+a.mins;
        tc(...PRI);bf('bold',8.5);
        doc.text(a.mins+' min',W-MR,y+6,{align:'right'});
      }
      y+=rh;
    });

    // Total bar
    y+=1;y=chk(10,y);
    rect(ML,y,CW,9,PRI_LT);
    rect(ML,y,CW,1,PRI_MD);
    tc(...PRI);bf('bold',8.5);
    doc.text('TOTAL MEETING DURATION',ML+6,y+6.5);
    tc(...PRI_MD);bf('bold',9.5);
    doc.text(totMins+' minutes',W-MR,y+6.5,{align:'right'});
    y+=15;
  }

  // ─── SECTION 2: DISCUSSION POINTS ───
  const kps=(m.keyPoints||[]).filter(p=>p.trim());
  if(kps.length){
    y=chk(20,y);
    y=secHead('02','Key Discussion Points',y);

    kps.forEach((p,i)=>{
      const lines=wrap(p,CW-18);
      const rh=lines.length*5.6+9;
      y=chk(rh+2,y);
      rect(ML,y,CW,rh,i%2===0?WH:BG_ROW);
      rect(ML,y,1.5,rh,i%2===0?PRI_LT:BRD);
      hline(y+rh,ML,W-MR,0.2,RULE);
      // Number bubble
      rect(ML+4,y+2,6,6,PRI_LT);
      tc(...PRI);bf('bold',7.5);doc.text(String(i+1),ML+7,y+6.5,{align:'center'});
      // Text
      tc(...TXT);bf('normal',9.5);
      lines.forEach((l,li)=>doc.text(l,ML+14,y+7+li*5.6));
      y+=rh;
    });
    y+=8;
  }

  // ─── SECTION 3: NOTES ───
  if(m.notes&&m.notes.trim()){
    y=chk(20,y);
    const sn=kps.length?'03':'02';
    y=secHead(sn,'Notes & Decisions',y);
    const noteLines=wrap(m.notes,CW-10);
    const bh=noteLines.length*5.6+10;
    y=chk(bh+4,y);
    rect(ML,y,CW,bh,PRI_XL);
    rect(ML,y,3,bh,PRI_MD);
    dc(...BRD);lw(0.25);doc.rect(ML,y,CW,bh,'S');
    tc(...TXT);bf('normal',9.5);
    let ly=y+7;
    noteLines.forEach(l=>{
      if(ly+6>y+bh-2)return;
      doc.text(l,ML+8,ly);ly+=5.6;
    });
    y+=bh+10;
  }

  // ─── SECTION 4: ACTION ITEMS ───
  if((m.actionItems||[]).length){
    y=chk(30,y);
    const hasNotes=m.notes&&m.notes.trim();
    const hasDp=kps.length>0;
    const sn=hasNotes?(hasDp?'04':'03'):(hasDp?'03':'02');
    y=secHead(sn,'Action Items',y);

    // Column layout: total CW=170
    // #8 | Task 62 | Owner 28 | Priority 22 | Due 26 | Status 24
    const C=[
      {k:'num',  x:ML,      w:9,  lbl:'#'},
      {k:'task', x:ML+9,    w:60, lbl:'ACTION ITEM'},
      {k:'own',  x:ML+69,   w:30, lbl:'OWNER'},
      {k:'pri',  x:ML+99,   w:22, lbl:'PRIORITY'},
      {k:'due',  x:ML+121,  w:26, lbl:'DUE DATE'},
      {k:'sta',  x:ML+147,  w:W-MR-(ML+147), lbl:'STATUS'},
    ];

    // Header
    rect(ML,y,CW,9,PRI);
    // Inner accent line
    rect(ML,y,CW,1.5,PRI_MD);
    C.forEach(col=>{
      tc(...WH);bf('bold',6.5);doc.setCharSpace(0.6);
      doc.text(col.lbl,col.k==='num'?col.x+col.w/2:col.x+2,y+6.5,col.k==='num'?{align:'center'}:{});
    });
    doc.setCharSpace(0);
    y+=10;

    m.actionItems.forEach((a,i)=>{
      const tl=wrap(a.task||'—',C[1].w-3);
      const rh=Math.max(tl.length*5.2+8,12);
      y=chk(rh+1,y);

      const even=i%2===0;
      rect(ML,y,CW,rh,even?WH:BG_ROW);
      // Left accent
      rect(ML,y,2,rh,even?PRI_LT:BRD);
      hline(y+rh,ML,W-MR,0.2,RULE);

      // Column dividers
      dc(...RULE);lw(0.2);
      C.slice(2).forEach(col=>doc.line(col.x-1,y,col.x-1,y+rh));

      const mid=y+rh/2+1.5;

      // # number
      tc(...TXT3);bf('normal',8);
      doc.text(String(i+1),C[0].x+C[0].w/2,mid,{align:'center'});

      // Task
      const isDone=a.status==='Done';
      tc(...(isDone?TXT3:TXT));bf(isDone?'normal':'normal',9);
      tl.forEach((l,li)=>{
        if(isDone){
          // Draw strikethrough
          doc.text(l,C[1].x+2,y+7+li*5.2);
          dc(...TXT3);lw(0.3);
          const tw=doc.getStringUnitWidth(l)*9/doc.internal.scaleFactor;
          doc.line(C[1].x+2,y+5.5+li*5.2,C[1].x+2+tw,y+5.5+li*5.2);
        } else {
          doc.text(l,C[1].x+2,y+7+li*5.2);
        }
      });

      // Owner
      tc(...TXT);bf('bold',8.5);
      doc.text((a.owner||'—').slice(0,16),C[2].x+2,mid);

      // Priority badge
      const pTx=a.priority==='High'?R_TXT:a.priority==='Low'?G_TXT:A_TXT;
      const pBg=a.priority==='High'?R_BG:a.priority==='Low'?G_BG:A_BG;
      const pBr=a.priority==='High'?R_BR:a.priority==='Low'?G_BR:A_BR;
      const pLabel=a.priority||'Medium';
      rect(C[3].x+2,y+rh/2-3,C[3].w-4,6.5,pBg);
      dc(...pBr);lw(0.25);doc.rect(C[3].x+2,y+rh/2-3,C[3].w-4,6.5,'S');
      tc(...pTx);bf('bold',7);
      doc.text(pLabel.toUpperCase().slice(0,3),C[3].x+2+(C[3].w-4)/2,y+rh/2+1.5,{align:'center'});

      // Due date
      tc(...TXT2);bf('normal',8.5);
      doc.text(fmtDate(a.timeline),C[4].x+2,mid);

      // Status badge
      const sTx=a.status==='Done'?G_TXT:a.status==='In Progress'?B_TXT:A_TXT;
      const sBg=a.status==='Done'?G_BG:a.status==='In Progress'?B_BG:A_BG;
      const sBr=a.status==='Done'?G_BR:a.status==='In Progress'?B_BR:A_BR;
      const sLabel=a.status==='In Progress'?'In Progress':a.status||'Open';
      rect(C[5].x+1,y+rh/2-3,C[5].w-3,6.5,sBg);
      dc(...sBr);lw(0.25);doc.rect(C[5].x+1,y+rh/2-3,C[5].w-3,6.5,'S');
      tc(...sTx);bf('bold',6.5);
      doc.text(sLabel,C[5].x+1+(C[5].w-3)/2,y+rh/2+1.5,{align:'center'});

      y+=rh;
    });

    // Summary strip
    y+=2;y=chk(10,y);
    const dn=(m.actionItems||[]).filter(a=>a.status==='Done').length;
    const op=(m.actionItems||[]).filter(a=>a.status==='Open').length;
    const pr=(m.actionItems||[]).filter(a=>a.status==='In Progress').length;
    rect(ML,y,CW,9,PRI_LT);
    rect(ML,y,CW,1,PRI_MD);
    tc(...TXT2);bf('normal',7.5);
    doc.text(
      m.actionItems.length+' Total  ·  '+dn+' Completed  ·  '+pr+' In Progress  ·  '+op+' Open',
      ML+6, y+6.5
    );
    y+=15;
  }

  // ─── SIGNATURE BLOCK ───
  y=chk(50,y)+4;
  rect(ML,y,CW,8,PRI_LT);
  rect(ML,y,3,8,PRI);
  tc(...ACC);bf('bold',7.5);doc.setCharSpace(1.2);
  doc.text('SIGN OFF',ML+7,y+5.5);doc.setCharSpace(0);
  y+=13;

  const sigW=(CW-12)/3;
  ['Prepared By','Reviewed By','Approved By'].forEach((lbl,i)=>{
    const sx=ML+i*(sigW+6);
    rect(sx,y,sigW,22,BG_ROW);
    dc(...BRD);lw(0.25);doc.rect(sx,y,sigW,22,'S');
    rect(sx,y,sigW,2.5,PRI_MD);
    // Signature line
    hline(y+16,sx+4,sx+sigW-4,0.5,[140,160,175]);
    tc(...TXT2);bf('normal',7.5);
    doc.text(lbl,sx+sigW/2,y+12,{align:'center'});
    tc(...TXT3);bf('normal',6.5);
    doc.text('Signature & Date',sx+sigW/2,y+20,{align:'center'});
  });

  doc.save(((m.company?m.company+'-':'')+( m.title||'meeting')).replace(/[^a-z0-9]+/gi,'-').toLowerCase()+'-minutes.pdf');
  showToast('PDF exported successfully');
}

if(meetings.length)currentId=meetings[meetings.length-1].id;
renderList();renderEditor();
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveMeeting();}});
</script>
</body>
</html>
